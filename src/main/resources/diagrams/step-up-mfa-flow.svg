<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="920" viewBox="0 0 1040 920" role="img" aria-labelledby="title desc">
  <title id="title">Spring Boot OIDC Authentication State Engine</title>
  <desc id="desc">Top-to-bottom step-up authentication workflow with success and failure paths.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475467"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="36" y="34" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#101828">Spring Boot OIDC Authentication State Engine</text>

  <ellipse cx="450" cy="90" rx="38" ry="38" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="450" y="94" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#101828">START</text>

  <path d="M 450 128 L 450 160" stroke="#475467" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="468" y="145" font-family="Arial, sans-serif" font-size="11" fill="#344054">LOGIN_REQUESTED</text>

  <rect x="320" y="160" width="260" height="56" rx="8" fill="#f9fafb" stroke="#344054" stroke-width="2"/>
  <text x="450" y="184" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#101828">REDIRECT_TO_IDP</text>
  <text x="450" y="202" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#344054">Spring Security redirects to Auth0</text>

  <path d="M 450 216 L 450 260" stroke="#475467" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="468" y="243" font-family="Arial, sans-serif" font-size="11" fill="#344054">OIDC_CALLBACK_RECEIVED</text>

  <rect x="300" y="260" width="300" height="56" rx="8" fill="#fef3c7" stroke="#344054" stroke-width="2"/>
  <text x="450" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#101828">VALIDATE_TOKEN</text>
  <text x="450" y="302" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#344054">OIDC token and email verification</text>

  <path d="M 450 316 L 450 360" stroke="#475467" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="468" y="343" font-family="Arial, sans-serif" font-size="11" fill="#344054">TOKEN_VALID</text>

  <path d="M 600 290 L 762 290" stroke="#dc2626" stroke-width="2.5" fill="none" marker-end="url(#arrow-red)"/>
  <text x="620" y="282" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#dc2626">TOKEN_INVALID</text>

  <ellipse cx="850" cy="290" rx="70" ry="46" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="850" y="294" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#dc2626">AUTH_FAILED</text>

  <rect x="285" y="360" width="330" height="56" rx="8" fill="#f5f3ff" stroke="#344054" stroke-width="2"/>
  <text x="450" y="384" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#101828">LOAD_USER_PROFILE</text>
  <text x="450" y="402" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#344054">Extract email, name, groups/roles</text>

  <path d="M 450 416 L 450 460" stroke="#475467" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="468" y="443" font-family="Arial, sans-serif" font-size="11" fill="#344054">PROFILE_LOADED</text>

  <rect x="315" y="460" width="270" height="56" rx="8" fill="#e0f2fe" stroke="#344054" stroke-width="2"/>
  <text x="450" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#101828">REQUIRE_MFA</text>
  <text x="450" y="502" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#344054">Prompt and verify one-time code</text>

  <path d="M 450 516 L 450 578" stroke="#475467" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="468" y="550" font-family="Arial, sans-serif" font-size="11" fill="#344054">MFA_PASSED</text>

  <path d="M 585 490 L 750 490" stroke="#dc2626" stroke-width="2.5" fill="none" marker-end="url(#arrow-red)"/>
  <text x="620" y="482" text-anchor="start" font-family="Arial, sans-serif" font-size="11" fill="#dc2626">MFA_FAILED</text>

  <ellipse cx="860" cy="490" rx="100" ry="54" fill="#fee2e2" fill-opacity="0.75" stroke="#dc2626" stroke-width="2"/>
  <text x="860" y="494" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#dc2626">AUTH_FAILED</text>

  <ellipse cx="450" cy="620" rx="92" ry="42" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="450" y="624" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#101828">STEP_UP_SUCCESS</text>
</svg>
