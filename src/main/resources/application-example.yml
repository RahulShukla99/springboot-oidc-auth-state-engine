# Copy this file to src/main/resources/application-local.yml for local development.
# Never commit application-local.yml.

spring:
  security:
    oauth2:
      client:
        registration:
          auth0:
            client-id: your-client-id
            client-secret: your-client-secret
            scope:
              - openid
              - profile
              - email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          auth0:
            issuer-uri: https://your-auth0-domain.us.auth0.com/

management:
  endpoints:
    web:
      exposure:
        include: health,metrics

springdoc:
  swagger-ui:
    path: /swagger-ui.html

auth:
  flows:
    login: classpath:auth-flow.xml
    step-up: classpath:step-up-auth-flow.xml
  logout:
    post-logout-redirect-uri: http://localhost:8080/
  jwt:
    allowed-clock-skew-seconds: 60
  mfa:
    challenge-code: 123456
  step-up-rate-limit:
    max-attempts: 5
    window: 60s
  allowed-groups: APP_USER,APP_ADMIN
  audit:
    max-records: 100
